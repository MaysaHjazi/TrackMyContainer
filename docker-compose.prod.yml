services:
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: tmc/next-app:latest
    container_name: tmc-next-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      # env_file's parser drops display names containing spaces / "<>"
      # — keep this here so emails render as "TrackMyContainer" in the inbox
      - "RESEND_FROM=TrackMyContainer <onboarding@resend.dev>"
    networks:
      - tmc-net
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: tmc/worker:latest
    container_name: tmc-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # See note on next-app — env_file mangles values with spaces / "<>"
      - "RESEND_FROM=TrackMyContainer <onboarding@resend.dev>"
    networks:
      - tmc-net

networks:
  tmc-net:
    external: true
