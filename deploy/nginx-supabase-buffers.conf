# Custom nginx settings for /data/nginx/custom/server_proxy.conf on VPS
#
# Purpose: increase proxy header buffers so the Set-Cookie response
# from /auth/callback (multiple Supabase auth tokens after OAuth)
# doesn't trip nginx's "upstream sent too big header" → 502 Bad Gateway.
#
# Symptom this fixes:
#   /auth/callback succeeds at the app level (logs show
#   "SUCCESS, redirecting to /dashboard") but the user's browser sees
#   502 because the response header is ~5–8KB and nginx's default
#   proxy_buffer_size is only 4KB.
#
# Install:
#   ssh tmc 'docker exec tmc-npm sh -c "
#     cp /opt/trackmycontainer/deploy/nginx-supabase-buffers.conf \
#        /data/nginx/custom/server_proxy.conf && nginx -s reload"'
#
# Verify:
#   docker exec tmc-npm cat /data/nginx/custom/server_proxy.conf
#   curl -sI https://trackmycontainer.info/login    # 200
#   # then click Continue with Google end to end

proxy_buffer_size       16k;
proxy_buffers           8 16k;
proxy_busy_buffers_size 32k;
